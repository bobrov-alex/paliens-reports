<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
  background: #f0f0f5;
  display: flex; align-items: center; justify-content: center;
  min-height: 100vh; padding: 20px;
}
.gate {
  background: #fff;
  border-radius: 18px;
  padding: 36px 32px;
  max-width: 360px;
  width: 100%;
  box-shadow: 0 8px 32px rgba(0,0,0,0.12);
  text-align: center;
}
.logo {
  font-size: 32px;
  margin-bottom: 12px;
}
.gate h1 {
  font-size: 17px;
  font-weight: 600;
  color: #1d1d1f;
  margin-bottom: 6px;
}
.gate p {
  font-size: 13px;
  color: #6e6e73;
  margin-bottom: 24px;
  line-height: 1.4;
}
input[type=password] {
  width: 100%;
  padding: 12px 14px;
  border: 1.5px solid #d2d2d7;
  border-radius: 10px;
  font-size: 15px;
  outline: none;
  transition: border-color 0.2s;
  margin-bottom: 12px;
}
input[type=password]:focus { border-color: #2563c8; }
button {
  width: 100%;
  padding: 13px;
  background: #2563c8;
  color: #fff;
  border: none;
  border-radius: 10px;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  transition: background 0.15s;
}
button:hover { background: #1a4a8a; }
.err {
  font-size: 13px;
  color: #c0392b;
  margin-top: 10px;
  display: none;
}
</style>
</head>

</div>

async function deriveKey(password, salt) {
  const enc = new TextEncoder();
  const keyMaterial = await crypto.subtle.importKey(
    'raw', enc.encode(password), 'PBKDF2', false, ['deriveBits']
  );
  const bits = await crypto.subtle.deriveBits(
    { name: 'PBKDF2', salt: salt, iterations: 600000, hash: 'SHA-256' },
    keyMaterial, 256
  );
  return crypto.subtle.importKey('raw', bits, { name: 'AES-CBC' }, false, ['decrypt']);
}

function b64ToBytes(b64) {
  const bin = atob(b64);
  const bytes = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
  return bytes;
}

async function unlock() {
  const pwd = document.getElementById('pwd').value;
  if (!pwd) return;
  try {
    const salt = b64ToBytes(PAYLOAD.s);
    const iv   = b64ToBytes(PAYLOAD.iv);
    const ct   = b64ToBytes(PAYLOAD.ct);
    const key  = await deriveKey(pwd, salt);
    const decrypted = await crypto.subtle.decrypt({ name: 'AES-CBC', iv }, key, ct);
    const html = new TextDecoder().decode(decrypted).replace(/\x00+$/, '').trimEnd();
    // Replace current page with decrypted content
    document.open();
    document.write(html);
    document.close();
  } catch(e) {
    document.getElementById('err').style.display = 'block';
    document.getElementById('pwd').value = '';
    document.getElementById('pwd').focus();
  }
}
