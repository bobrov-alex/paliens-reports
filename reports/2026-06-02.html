<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {

.gate {

}
input[type=password]:focus { border-color: #2563c8; }
button {
  width: 100%; padding: 13px;
  background: #2563c8; color: #fff; border: none;
  border-radius: 10px; font-size: 15px; font-weight: 600;
  cursor: pointer; transition: background 0.15s;
}
button:hover { background: #1a4a8a; }
.err { font-size: 13px; color: #c0392b; margin-top: 10px; display: none; }
.loading { font-size: 13px; color: #6e6e73; margin-top: 10px; display: none; }

const PASSWORD = "Paliens2026";
const SESSION_KEY = 'paliens_pw';

function show() {
  const bytes = Uint8Array.from(atob(CONTENT), c => c.charCodeAt(0));
  const html = new TextDecoder('utf-8').decode(bytes);
  document.open();
  document.write(html);
  document.close();
}

function unlock() {
  const pwd = document.getElementById('pwd').value;
  if (!pwd) return;
  document.getElementById('err').style.display = 'none';
  document.getElementById('loading').style.display = 'block';
  if (pwd === PASSWORD) {
    sessionStorage.setItem(SESSION_KEY, pwd);
    show();
  } else {
    document.getElementById('err').style.display = 'block';
    document.getElementById('loading').style.display = 'none';
    document.getElementById('pwd').value = '';
    document.getElementById('pwd').focus();
  }
}

// SSO: auto-unlock if password already entered on another page
window.addEventListener('DOMContentLoaded', () => {
  const saved = sessionStorage.getItem(SESSION_KEY);
  if (saved === PASSWORD) {
    document.getElementById('loading').style.display = 'block';
    document.querySelector('.gate p').textContent = 'Открываю…';
    document.querySelector('input').style.display = 'none';
    document.querySelector('button').style.display = 'none';
    show();
  }
});
</script>
